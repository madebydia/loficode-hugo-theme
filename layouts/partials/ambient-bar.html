<div class="ambient-bar">
    <div class="ambient-controls">
        <button class="mute-toggle muted" title="Toggle ambient sounds" aria-label="Toggle ambient sounds">
            <span class="icon-glyph" aria-hidden="true">🔇</span>
        </button>
        <button class="ambient-icon" data-sound="coffee" title="Coffee Shop Ambience" aria-label="Coffee shop ambience">
            <span class="icon-glyph" aria-hidden="true">☕</span>
        </button>
        <button class="ambient-icon" data-sound="rain" title="Gentle Rain" aria-label="Gentle rain">
            <span class="icon-glyph" aria-hidden="true">🌧</span>
        </button>
        <button class="ambient-icon" data-sound="fireplace" title="Crackling Fireplace" aria-label="Crackling fireplace">
            <span class="icon-glyph" aria-hidden="true">🔥</span>
        </button>
    </div>

    <div class="ambient-label">Click to start ambient sounds</div>

    <div class="volume-container">
        <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="{{ .Site.Params.ambient_sounds.default_volume }}" aria-label="Ambient sound volume">
        <div class="equalizer muted" aria-hidden="true">
            {{ range (seq 8) }}
            <div class="equalizer-bar"></div>
            {{ end }}
        </div>
    </div>
</div>
